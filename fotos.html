<!DOCTYPE html> <!-- determinando o formato do documento -->
<html lang="pt-br"> <!-- determinando o idioma do site -->

<head> <!-- inicio das metatags -->

    <meta charset="UTF-8"> <!-- Define a codificação de caracteres do site -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site se adaptar corretamente em celulares e tablets -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Compatibilidade com versões antigas do Internet Explorer -->
    <meta name="author" content="Kinha Sousa"> <!-- Nome da autora/desenvolvedora do projeto -->
    <meta name="description" content="Site da banda Som Que Liberta desenvolvido com HTML e CSS.">
    <!-- Descrição do site para mecanismos de busca -->
    <meta name="keywords" content="banda, música, louvor, adoração, HTML, CSS, site responsivo">
    <!-- Palavras-chave relacionadas ao site -->
    <link rel="stylesheet" href="style.css"> <!-- Conecta o arquivo CSS ao HTML -->
    <title>Banda SQL</title> <!-- Título que aparece na aba do navegador -->

</head> <!-- fim das metatags -->
    
<body> <!-- inicio, conteúdo principal exibido no site -->
    <!-- Imagem de fundo do site -->
    <img src="image/fundo.jpg" class="fundo">
    <div class="carrossel">
        <img src="image/Adriele.jpg" alt="Adriele vocalista" class="ativo">
        <img src="image/Neury.jpg" alt="Neury vocalista">
        <img src="image/Midia.jpg" alt="Midia vocalista">
        <img src="image/Elenita.jpg" alt="Elenita vocalista">
        <img src="image/Wylkson.jpg" alt="Wylkson vocalista">
        <img src="image/Elionai.jpg" alt="Elionai baterista">
        <img src="image/Nathan.jpg" alt="Nathan tecladista">
        <img src="image/Vitor.jpg" alt="Vitor guitarista">
        <img src="image/Nicolas.jpg" alt="Nicolas baixista">
    </div>
    <!-- legendas separadas -->
    <div class="legendas">
        <span class="ativa">Adriele (vocalista)</span>
        <span>Neury (vocalista)</span>
        <span>Midia (vocalista)</span>
        <span>Elenita (vocalista)</span>
        <span>Wylkson (vocalista)</span>
        <span>Elionai (baterista)</span>
        <span>Nathan (tecladista)</span>
        <span>Vitor (guitarista)</span>
        <span>Nicolas (baixista)</span>
    </div>
    <a href="index.html">Voltar para página inicial</a>
    <script src="script.js"></script>
</body> <!-- fim do body -->

</html> <!-- Fim do documento HTML -->
