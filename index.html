<!DOCTYPE html> <!-- determinando o formato do documento -->
<html lang="pt-br"> <!-- determinando o idioma do site -->

  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Compatibilidade com versões antigas do Internet Explorer -->
  <meta name="author" content="Kinha Sousa"> <!-- Nome da autora/desenvolvedora do projeto -->

  <!-- Descrição do site para mecanismos de busca -->
  <meta name="keywords" content="banda, música, louvor, adoração, HTML, CSS, site responsivo">
  <!-- Palavras-chave relacionadas ao site -->
  <link rel="stylesheet" href="style.css"> <!-- Conecta o arquivo CSS ao HTML -->

</head> <!-- fim das metatags -->

    <!-- Lista de navegação -->
    <ul>

      <!-- Link para a página inicial -->
